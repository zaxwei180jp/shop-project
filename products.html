<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>商品頁</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex">

<!-- 側邊欄 -->
<div class="w-60 bg-white h-screen p-5 shadow">
  <h2 class="text-xl font-bold mb-5">我的商店</h2>
  <a href="index.html" class="block mb-3">首頁</a>
  <a href="products.html" class="block mb-3">商品</a>
  <a href="cart.html" class="block">購物車</a>
</div>

<!-- 主內容 -->
<div class="flex-1 p-10">

  <h1 class="text-3xl font-bold mb-6">全部商品</h1>

  <!-- ⭐ 篩選區 -->
  <div class="flex gap-4 mb-6">

    <select id="categoryFilter" class="p-2 border rounded">
      <option value="">全部分類</option>
      <option value="COSTCO">COSTCO</option>
      <option value="日本超市">日本超市</option>
      <option value="日本超商">日本超商</option>
    </select>

    <select id="sortOption" class="p-2 border rounded">
      <option value="">預設排序</option>
      <option value="price-high">價格高 → 低</option>
      <option value="price-low">價格低 → 高</option>
      <option value="new">最新</option>
    </select>

  </div>

  <!-- 商品列表 -->
  <div id="product-list" class="grid grid-cols-3 gap-6"></div>

</div>

<script src="js/main.js"></script>
</body>
</html>
